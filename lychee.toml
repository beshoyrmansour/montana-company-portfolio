# lychee link-checker config
# Runs in CI to catch broken doc links. See .github/workflows/ci.yml.

# Output mode
verbose = "info"
no_progress = true

# Treat 429 (rate-limited) as acceptable — we'll see real failures elsewhere.
accept = ["200..=299", "429"]

# Don't recurse into vendored / generated trees.
exclude_path = [
  "node_modules",
  "out",
  ".next",
  "test-results",
  "playwright-report",
]

# URL/path patterns to skip — intentional placeholders + dynamic targets.
exclude = [
  # PNG placeholders only — real screenshots may not yet exist on disk.
  # SVG illustrations DO exist and are link-checked normally.
  "_images/.*\\.(png|jpg|jpeg|gif)$",
  # Localhost references in code examples.
  "^https?://localhost",
  "^https?://127\\.0\\.0\\.1",
  # Wildcard placeholders in docs.
  "example\\.com",
  # Bot-hostile hosts that 403 automated checkers but are valid for humans:
  # Pexels (image credits) and the Cloudflare dashboard (Turnstile setup links).
  "^https?://(www\\.)?pexels\\.com",
  "^https?://dash\\.cloudflare\\.com",
]

# Be polite to remote hosts.
max_concurrency = 8
timeout = 20
retry_wait_time = 2
max_retries = 2

# GitHub rate-limits anonymous requests; the action sets GITHUB_TOKEN.
github_token = ""
