<svg xmlns="http://www.w3.org/2000/svg" width="400" height="64" viewBox="0 0 400 64" fill="none">
  <title>Ramadan lantern divider with mihrab arches</title>
  <g stroke="#DAA520" stroke-width="1.1" stroke-linecap="round" fill="none">
    <!-- Far-left ornamental line -->
    <line x1="8" y1="32" x2="80" y2="32"/>
    <!-- Left mihrab (pointed arch) silhouette -->
    <g transform="translate(96 32)">
      <!-- Arch outline: bottom-left up, peak, down to bottom-right -->
      <path d="M-10 8 L-10 -2 Q-10 -10 0 -14 Q10 -10 10 -2 L10 8 Z" fill="#DAA52012"/>
      <!-- Inner arch (door) -->
      <path d="M-5 8 L-5 0 Q-5 -6 0 -8 Q5 -6 5 0 L5 8" stroke-opacity="0.7"/>
      <!-- Tiny finial -->
      <circle cx="0" cy="-16" r="1.3" fill="#DAA520" stroke="none"/>
      <line x1="0" y1="-14" x2="0" y2="-16"/>
    </g>
    <!-- Arabesque scroll (left side) -->
    <g transform="translate(120 32)" stroke-width="1">
      <path d="M0 0 Q 6 -6 12 0 T 24 0" />
      <path d="M0 0 Q 6 6 12 0 T 24 0" stroke-opacity="0.6"/>
      <circle cx="3" cy="-3" r="0.9" fill="#DAA520" stroke="none"/>
      <circle cx="21" cy="3" r="0.9" fill="#DAA520" stroke="none"/>
    </g>
    <!-- Central lantern (fanous) — larger, more ornate -->
    <g transform="translate(200 32)" stroke-width="1.3" stroke-linejoin="round">
      <!-- Top finial -->
      <line x1="0" y1="-28" x2="0" y2="-24"/>
      <circle cx="0" cy="-28" r="1" fill="#DAA520" stroke="none"/>
      <!-- Crown caps -->
      <path d="M-9 -24 L9 -24 L7 -20 L-7 -20 Z" fill="#DAA52030"/>
      <path d="M-7 -20 L7 -20 L6 -16 L-6 -16 Z" fill="#DAA52020"/>
      <!-- Hexagonal body -->
      <path d="M-11 -16 L11 -16 L14 -6 L11 10 L-11 10 L-14 -6 Z" fill="#DAA52015"/>
      <!-- Vertical body bars -->
      <line x1="-6" y1="-16" x2="-6" y2="10"/>
      <line x1="6" y1="-16" x2="6" y2="10"/>
      <!-- Decorative horizontal band -->
      <line x1="-11" y1="-6" x2="11" y2="-6" stroke-opacity="0.55"/>
      <!-- Small khatim inside lantern (replaces the crescent flame) -->
      <g transform="translate(0 -2)">
        <rect x="-3" y="-3" width="6" height="6" stroke-opacity="0.85"/>
        <rect x="-3" y="-3" width="6" height="6" transform="rotate(45)" stroke-opacity="0.85"/>
        <circle cx="0" cy="0" r="1" fill="#DAA520" stroke="none"/>
      </g>
      <!-- Bottom caps -->
      <path d="M-9 10 L9 10 L7 14 L-7 14 Z" fill="#DAA52030"/>
      <!-- Bottom finial -->
      <line x1="0" y1="14" x2="0" y2="20"/>
      <circle cx="0" cy="20" r="1" fill="#DAA520" stroke="none"/>
    </g>
    <!-- Arabesque scroll (right side, mirrored) -->
    <g transform="translate(256 32)" stroke-width="1">
      <path d="M24 0 Q 18 -6 12 0 T 0 0" />
      <path d="M24 0 Q 18 6 12 0 T 0 0" stroke-opacity="0.6"/>
      <circle cx="21" cy="-3" r="0.9" fill="#DAA520" stroke="none"/>
      <circle cx="3" cy="3" r="0.9" fill="#DAA520" stroke="none"/>
    </g>
    <!-- Right mihrab (mirror of left) -->
    <g transform="translate(304 32)">
      <path d="M-10 8 L-10 -2 Q-10 -10 0 -14 Q10 -10 10 -2 L10 8 Z" fill="#DAA52012"/>
      <path d="M-5 8 L-5 0 Q-5 -6 0 -8 Q5 -6 5 0 L5 8" stroke-opacity="0.7"/>
      <circle cx="0" cy="-16" r="1.3" fill="#DAA520" stroke="none"/>
      <line x1="0" y1="-14" x2="0" y2="-16"/>
    </g>
    <!-- Far-right ornamental line -->
    <line x1="320" y1="32" x2="392" y2="32"/>
  </g>
</svg>
