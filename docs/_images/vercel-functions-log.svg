<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Vercel Runtime Logs panel showing function invocations of /api/contact. Each row shows time, request path, status code, and duration. One row is expanded to reveal a console.error output from the function.">
  <style>
    .bg { fill: #fafafa; }
    .card { fill: #ffffff; stroke: #eaeaea; stroke-width: 1; }
    .sidebar { fill: #ffffff; }
    .text { font: 14px -apple-system, "Inter", system-ui, sans-serif; fill: #000000; }
    .small { font: 12px -apple-system, "Inter", system-ui, sans-serif; fill: #666666; }
    .heading { font: 600 18px -apple-system, "Inter", system-ui, sans-serif; fill: #000000; }
    .mono { font: 12px "JetBrains Mono", ui-monospace, monospace; fill: #000000; }
    .header-bar { fill: #000000; }
    .header-text { font: 600 15px -apple-system, "Inter", system-ui, sans-serif; fill: #ffffff; }
    .nav-inactive { font: 13px -apple-system, "Inter", system-ui, sans-serif; fill: #666666; }
    .nav-active-text { font: 13px -apple-system, "Inter", system-ui, sans-serif; fill: #000000; font-weight: 600; }
    .input { fill: #ffffff; stroke: #eaeaea; stroke-width: 1; }
    .badge-ok { fill: #ffffff; stroke: #10b981; stroke-width: 1; }
    .badge-ok-text { font: 600 11px "JetBrains Mono", ui-monospace, monospace; fill: #065f46; }
    .badge-warn { fill: #ffffff; stroke: #f59e0b; stroke-width: 1; }
    .badge-warn-text { font: 600 11px "JetBrains Mono", ui-monospace, monospace; fill: #92400e; }
    .badge-err { fill: #ffffff; stroke: #ef4444; stroke-width: 1; }
    .badge-err-text { font: 600 11px "JetBrains Mono", ui-monospace, monospace; fill: #991b1b; }
    .row-hl { fill: #fef2f2; }
    .live-dot { fill: #ef4444; }
    .callout { fill: #fef9c3; stroke: #ca8a04; stroke-width: 1.5; stroke-dasharray: 4 2; }
    .callout-text { font: 600 12px -apple-system, "Inter", system-ui, sans-serif; fill: #713f12; }
    .arrow { stroke: #ca8a04; stroke-width: 2; fill: none; }
  </style>

  <rect class="bg" width="800" height="500"/>

  <rect class="header-bar" x="0" y="0" width="800" height="48"/>
  <polygon points="20,32 32,12 44,32" fill="#ffffff"/>
  <text class="header-text" x="60" y="30">Vercel</text>
  <text class="header-text" x="125" y="30" font-weight="400" opacity="0.6">/  montana-web</text>

  <!-- Project nav -->
  <line x1="0" y1="80" x2="800" y2="80" stroke="#eaeaea"/>
  <text class="nav-inactive" x="20" y="71">Overview</text>
  <text class="nav-inactive" x="100" y="71">Deployments</text>
  <text class="nav-inactive" x="195" y="71">Analytics</text>
  <text class="nav-active-text" x="265" y="71">Logs</text>
  <line x1="260" y1="78" x2="290" y2="78" stroke="#000000" stroke-width="2"/>
  <text class="nav-inactive" x="305" y="71">Settings</text>

  <!-- Heading -->
  <text class="heading" x="20" y="115">Runtime Logs</text>
  <circle class="live-dot" cx="138" cy="111" r="4"/>
  <text class="small" x="150" y="115">LIVE</text>
  <text class="small" x="20" y="135">Function invocations across all paths. /api/contact runs as a Node.js serverless function.</text>

  <!-- Filter bar -->
  <rect class="input" x="20" y="150" width="400" height="32" rx="6"/>
  <text class="small" x="34" y="171">🔍 Filter logs · status, path, error…</text>
  <rect class="input" x="430" y="150" width="160" height="32" rx="6"/>
  <text class="small" x="450" y="171">Last 1 hour</text>
  <rect class="input" x="600" y="150" width="180" height="32" rx="6"/>
  <text class="small" x="620" y="171">All status codes</text>

  <!-- Log card -->
  <rect class="card" x="20" y="195" width="760" height="270" rx="8"/>

  <!-- Column header -->
  <text class="small" x="35" y="218" font-weight="600" fill="#000000">TIME</text>
  <text class="small" x="135" y="218" font-weight="600" fill="#000000">PATH</text>
  <text class="small" x="320" y="218" font-weight="600" fill="#000000">FUNCTION</text>
  <text class="small" x="520" y="218" font-weight="600" fill="#000000">STATUS</text>
  <text class="small" x="640" y="218" font-weight="600" fill="#000000">DURATION</text>
  <line x1="30" y1="226" x2="770" y2="226" stroke="#eaeaea"/>

  <!-- Row 1 -->
  <text class="mono" x="35" y="248">15:42:18</text>
  <text class="mono" x="135" y="248">POST /api/contact</text>
  <text class="small" x="320" y="248">app/api/contact</text>
  <rect class="badge-ok" x="520" y="236" width="40" height="18" rx="9"/>
  <text class="badge-ok-text" x="531" y="249">200</text>
  <text class="mono" x="640" y="248">142 ms</text>

  <!-- Row 2 -->
  <text class="mono" x="35" y="278">15:41:51</text>
  <text class="mono" x="135" y="278">POST /api/contact</text>
  <text class="small" x="320" y="278">app/api/contact</text>
  <rect class="badge-ok" x="520" y="266" width="40" height="18" rx="9"/>
  <text class="badge-ok-text" x="531" y="279">200</text>
  <text class="mono" x="640" y="278">168 ms</text>

  <!-- Row 3 - HIGHLIGHTED ERROR -->
  <rect class="row-hl" x="20" y="290" width="760" height="34" rx="0"/>
  <text class="mono" x="35" y="312">15:41:09</text>
  <text class="mono" x="135" y="312">POST /api/contact</text>
  <text class="small" x="320" y="312">app/api/contact</text>
  <rect class="badge-err" x="520" y="300" width="40" height="18" rx="9"/>
  <text class="badge-err-text" x="531" y="313">502</text>
  <text class="mono" x="640" y="312">38 ms</text>

  <!-- Row 3 expanded log line -->
  <text class="mono" x="155" y="342" fill="#991b1b">› console.error: Resend failure: 401 invalid API key</text>

  <!-- Row 4 -->
  <text class="mono" x="35" y="368">15:39:45</text>
  <text class="mono" x="135" y="368">POST /api/contact</text>
  <text class="small" x="320" y="368">app/api/contact</text>
  <rect class="badge-warn" x="520" y="356" width="40" height="18" rx="9"/>
  <text class="badge-warn-text" x="531" y="369">400</text>
  <text class="mono" x="640" y="368">21 ms</text>

  <!-- Row 4 expanded -->
  <text class="mono" x="155" y="398" fill="#92400e">› Turnstile verification failed (likely bot)</text>

  <!-- Row 5 -->
  <text class="mono" x="35" y="425">15:38:12</text>
  <text class="mono" x="135" y="425">POST /api/contact</text>
  <text class="small" x="320" y="425">app/api/contact</text>
  <rect class="badge-ok" x="520" y="413" width="40" height="18" rx="9"/>
  <text class="badge-ok-text" x="531" y="426">200</text>
  <text class="mono" x="640" y="425">155 ms</text>

  <!-- Callout -->
  <rect class="callout" x="30" y="475" width="750" height="20" rx="4"/>
  <text class="callout-text" x="46" y="490">Submit a test form in another tab → new row appears within ~2s. Click a row to expand console output.</text>

  <!-- Arrow to highlighted error row -->
  <path class="arrow" d="M 100 475 Q 50 380 30 310" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ca8a04"/>
    </marker>
  </defs>
</svg>
