<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Resend dashboard API Keys page. A table lists existing API keys with masked values. The Create API Key button is in the top right.">
  <style>
    .bg { fill: #f8fafc; }
    .card { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1; }
    .sidebar { fill: #0a0a0a; }
    .text { font: 14px -apple-system, system-ui, sans-serif; fill: #0f172a; }
    .muted { fill: #64748b; }
    .small { font: 12px -apple-system, system-ui, sans-serif; fill: #64748b; }
    .heading { font: 600 16px -apple-system, system-ui, sans-serif; fill: #0f172a; }
    .mono { font: 13px ui-monospace, monospace; fill: #0f172a; }
    .header-bar { fill: #0a0a0a; }
    .header-text { font: 600 15px -apple-system, system-ui, sans-serif; fill: #ffffff; }
    .nav { font: 13px -apple-system, system-ui, sans-serif; fill: #a3a3a3; }
    .nav-active { font: 13px -apple-system, system-ui, sans-serif; fill: #ffffff; font-weight: 600; }
    .nav-active-bg { fill: #1f1f1f; }
    .btn { fill: #0f172a; }
    .btn-text { font: 600 13px -apple-system, system-ui, sans-serif; fill: #ffffff; }
    .pill-perm { fill: #ecfdf5; stroke: #10b981; stroke-width: 1; }
    .pill-perm-text { font: 11px ui-monospace, monospace; fill: #047857; }
    .pill-warn { fill: #fffbeb; stroke: #f59e0b; stroke-width: 1; }
    .pill-warn-text { font: 11px ui-monospace, monospace; fill: #b45309; }
    .callout { fill: #fff7ed; stroke: #f97316; stroke-width: 1.5; stroke-dasharray: 4 2; }
    .callout-text { font: 600 12px -apple-system, system-ui, sans-serif; fill: #9a3412; }
    .arrow { stroke: #f97316; stroke-width: 2; fill: none; }
    .dot { fill: #64748b; }
  </style>

  <rect class="bg" width="800" height="500"/>

  <rect class="header-bar" x="0" y="0" width="800" height="40"/>
  <text class="header-text" x="20" y="25">resend</text>
  <text class="nav" x="100" y="25">Domains</text>
  <text class="nav" x="170" y="25">Emails</text>
  <text class="nav" x="230" y="25">Audiences</text>
  <text class="nav-active" x="310" y="25">API Keys</text>

  <!-- Sidebar -->
  <rect class="sidebar" x="0" y="40" width="180" height="460"/>
  <text class="nav" x="20" y="75">Overview</text>
  <text class="nav" x="20" y="105">Domains</text>
  <text class="nav" x="20" y="135">Emails</text>
  <rect class="nav-active-bg" x="0" y="148" width="180" height="32"/>
  <text class="nav-active" x="20" y="169">API Keys</text>
  <text class="nav" x="20" y="199">Webhooks</text>
  <text class="nav" x="20" y="229">Logs</text>
  <text class="nav" x="20" y="259">Settings</text>

  <!-- Main heading -->
  <text class="heading" x="210" y="75">API Keys</text>
  <text class="small" x="210" y="93">Use API keys to authenticate requests from your app.</text>

  <!-- Create button -->
  <rect class="btn" x="630" y="60" width="150" height="34" rx="4"/>
  <text class="btn-text" x="650" y="82">+ Create API Key</text>

  <!-- Table card -->
  <rect class="card" x="210" y="115" width="570" height="320" rx="4"/>

  <!-- Column headers -->
  <text class="small" x="225" y="140">NAME</text>
  <text class="small" x="370" y="140">KEY</text>
  <text class="small" x="540" y="140">PERMISSIONS</text>
  <text class="small" x="680" y="140">CREATED</text>
  <line x1="220" y1="150" x2="770" y2="150" stroke="#e2e8f0"/>

  <!-- Row 1: montana-web-prod -->
  <text class="text" x="225" y="180">montana-web-prod</text>
  <text class="mono" x="370" y="180">re_••••••••</text>
  <rect class="pill-perm" x="540" y="167" width="78" height="18" rx="3"/>
  <text class="pill-perm-text" x="548" y="180">Full access</text>
  <text class="small" x="680" y="180">2 days ago</text>
  <circle class="dot" cx="745" cy="176" r="2"/>
  <circle class="dot" cx="753" cy="176" r="2"/>
  <circle class="dot" cx="761" cy="176" r="2"/>
  <line x1="220" y1="200" x2="770" y2="200" stroke="#e2e8f0"/>

  <!-- Row 2: montana-web-preview -->
  <text class="text" x="225" y="230">montana-web-preview</text>
  <text class="mono" x="370" y="230">re_••••••••</text>
  <rect class="pill-warn" x="540" y="217" width="100" height="18" rx="3"/>
  <text class="pill-warn-text" x="548" y="230">Sending access</text>
  <text class="small" x="680" y="230">5 days ago</text>
  <circle class="dot" cx="745" cy="226" r="2"/>
  <circle class="dot" cx="753" cy="226" r="2"/>
  <circle class="dot" cx="761" cy="226" r="2"/>
  <line x1="220" y1="250" x2="770" y2="250" stroke="#e2e8f0"/>

  <!-- Row 3: old key, to be revoked -->
  <text class="text" x="225" y="280" fill="#94a3b8" font-style="italic">montana-web (old)</text>
  <text class="mono" x="370" y="280" fill="#94a3b8">re_••••••••</text>
  <rect class="pill-perm" x="540" y="267" width="78" height="18" rx="3"/>
  <text class="pill-perm-text" x="548" y="280">Full access</text>
  <text class="small" x="680" y="280">3 months ago</text>
  <circle class="dot" cx="745" cy="276" r="2"/>
  <circle class="dot" cx="753" cy="276" r="2"/>
  <circle class="dot" cx="761" cy="276" r="2"/>

  <!-- Callout -->
  <rect class="callout" x="220" y="455" width="560" height="38" rx="4"/>
  <text class="callout-text" x="234" y="472">When you click "Create API Key", Resend shows the value ONCE.</text>
  <text class="callout-text" x="234" y="487" font-weight="400">Copy it immediately into Cloudflare Pages → Settings → Env vars → RESEND_API_KEY (encrypt).</text>

  <!-- Arrow to Create button -->
  <path class="arrow" d="M 600 460 Q 680 200 700 95" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f97316"/>
    </marker>
  </defs>
</svg>
